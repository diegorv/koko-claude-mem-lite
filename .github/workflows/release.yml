name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          for f in \
            plugin/scripts/hook.mjs \
            plugin/scripts/worker.mjs \
            plugin/scripts/mcp-server.mjs \
            plugin/scripts/setup.mjs \
            plugin/ui/index.html \
            plugin/hooks/hooks.json; do
            if [ ! -f "$f" ]; then
              echo "Missing artifact: $f"
              exit 1
            fi
          done
          echo "All artifacts verified."

      - name: Package plugin
        run: tar -czf memory-lite-plugin.tar.gz -C plugin .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: memory-lite-plugin.tar.gz
