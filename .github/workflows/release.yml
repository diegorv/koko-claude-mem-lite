name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag is on main branch
        run: |
          set -euo pipefail
          TAG_COMMIT=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Release tag ${{ github.ref_name }} is not on the main branch. Aborting."
            exit 1
          fi
          echo "Validated: ${{ github.ref_name }} is on main branch"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          for f in \
            plugin/scripts/hook.mjs \
            plugin/scripts/worker.mjs \
            plugin/scripts/mcp-server.mjs \
            plugin/scripts/setup.mjs \
            plugin/ui/index.html \
            plugin/hooks/hooks.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing artifact: $f"
              exit 1
            fi
          done
          echo "All artifacts verified."

      - name: Package plugin
        run: tar -czf memory-lite-plugin.tar.gz -C plugin .

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | grep -v "^${TAG}$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$TAG" | grep -v "^- chore: bump version")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}" | grep -v "^- chore: bump version")
          fi
          {
            echo "commits<<CHANGELOG_EOF"
            echo "$COMMITS"
            echo "CHANGELOG_EOF"
            echo "prev_tag=${PREV_TAG:-}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate SHA-256 checksum
        run: |
          set -euo pipefail
          shasum -a 256 memory-lite-plugin.tar.gz > checksums-sha256.txt
          echo "--- Checksum ---"
          cat checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          PREV_TAG="${{ steps.changelog.outputs.prev_tag }}"

          BODY="## What's Changed

          ${{ steps.changelog.outputs.commits }}"

          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}

          **Full diff:** [${PREV_TAG}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})"
          fi

          BODY="${BODY}

          ## Verify download integrity

          \`\`\`bash
          shasum -a 256 memory-lite-plugin.tar.gz
          \`\`\`

          Compare the output with \`checksums-sha256.txt\`."

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$BODY" \
            memory-lite-plugin.tar.gz \
            checksums-sha256.txt
