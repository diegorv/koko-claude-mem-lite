name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          for f in \
            plugin/scripts/hook.mjs \
            plugin/scripts/worker.mjs \
            plugin/scripts/mcp-server.mjs \
            plugin/scripts/setup.mjs \
            plugin/ui/index.html \
            plugin/hooks/hooks.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing artifact: $f"
              exit 1
            fi
          done
          echo "All artifacts verified."
